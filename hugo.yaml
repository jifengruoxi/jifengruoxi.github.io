baseURL: https://jifengruoxi.github.io
title: 我的博客
description: " "
author: jifengruoxi
defaultContentLanguage: zh-cn

theme: PaperMod

copyright: "© 2026 博主。本站原创内容除特别声明外，采用 [CC BY-NC-ND 4.0](https://creativecommons.org/licenses/by-nc-nd/4.0/deed.zh-hans) 许可协议。"

permalinks:
  posts: /posts/:sections/:slugorcontentbasename/

pagination:
  pagerSize: 10

menu:
  main:
    - identifier: study
      name: 学习
      url: /study/
      weight: 10
    - identifier: posts
      name: 文章
      url: /posts/
      weight: 20
    - identifier: whisper
      name: 碎碎念
      url: /whisper/
      weight: 30
    - identifier: about
      name: 关于
      url: /about/
      weight: 40

params:
  env: production
  defaultTheme: auto
  ShowReadingTime: true
  ShowWordCount: true
  ShowShareButtons: false
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowToc: true
  TocOpen: false
  disableSpecial1stPost: true
  disableAnchoredHeadings: false
  hideMeta: false
  hideSummary: false
  UseHugoToc: true

  homeInfoParams:
    Title: ""
    Content: >
      欢迎来到我的博客！

  socialIcons:
    - name: github
      url: "https://github.com/jifengruoxi"
    - name: email
      url: "mailto:you@example.com"

  editPost:
    URL: ""
    Text: ""

  label:
    text: "我的博客"

  cover:
    hidden: false
    hiddenInList: false
    hiddenInSingle: false

assets:
  favicon: "/favicon.ico"
  favicon16x16: "/favicon-16x16.png"
  favicon32x32: "/favicon-32x32.png"
  apple_touch_icon: "/apple-touch-icon.png"

outputs:
  home:
    - HTML
    - RSS
    - JSON

markup:
  highlight:
    style: github
    lineNos: false
    noClasses: false
  goldmark:
    renderer:
      unsafe: true
    extensions:
      passthrough:
        delimiters:
          block: [['\\[', '\\]'], ['$$', '$$']]
          inline: [['\\(', '\\)'], ['$'  , '$'  ]]
        enable: true

privacy:
  vimeo:
    disabled: true
  youtube:
    disabled: true

services:
  rss:
    limit: 10
baseURL = 'https://jifengruoxi.github.io/'
locale = 'zh-CN'
title = '季风的博客'
theme = 'PaperMod'

paginate = 10
enableRobotsTXT = true

[params]
  env = 'production'
  description = '个人技术博客，记录学习与思考'
  author = '季风'
  defaultTheme = 'auto'
  ShowShareButtons = true
  ShowReadingTime = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = true
  ShowPostNavLinks = true
  comments = false

  homeInfoParams = false

  socialIcons = [
    { name = 'github', url = 'https://github.com/' }
  ]

[menu]
  [[menu.main]]
    identifier = 'archives'
    name = '归档'
    url = '/archives'
    weight = 10

  [[menu.main]]
    identifier = 'search'
    name = '搜索'
    url = '/search'
    weight = 20

  [[menu.main]]
    identifier = 'tags'
    name = '标签'
    url = '/tags'
    weight = 30

[outputs]
  home = ['HTML', 'RSS', 'JSON']
